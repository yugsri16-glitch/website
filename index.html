<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Yug Srivastava — 18 y/o Coder, AI Agent Builder, Bot Dev, Video Designer, Graphic Designer & Social Media Marketer from Kanpur, India." />
    <meta name="keywords" content="Yug Srivastava, portfolio, AI developer, bot development, thumbnail designer, graphic designer, Kanpur" />
    <meta name="author" content="Yug Srivastava" />

    <!-- Open Graph -->
    <meta property="og:title" content="Yug Srivastava — Creative Technologist" />
    <meta property="og:description" content="18 y/o multi-skilled creator from Kanpur. Coder · AI Builder · Bot Dev · Video Designer · Growth Hacker." />
    <meta property="og:type" content="website" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23080808'/><text y='.9em' font-size='80' x='10'>⚡</text></svg>" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />

    <title>Yug Srivastava — Creative Technologist</title>

    <style>
      /* Prevent flash of unstyled content */
      html { background: #080808; }
      #root { min-height: 100vh; }

      /* Loading screen */
      #loader {
        position: fixed; inset: 0;
        background: #080808;
        display: flex; align-items: center; justify-content: center;
        z-index: 99999;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #loader.hidden { opacity: 0; visibility: hidden; }
      .loader-inner {
        display: flex; flex-direction: column; align-items: center; gap: 24px;
      }
      .loader-name {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 4rem; letter-spacing: 0.1em;
        color: #FFE000;
        animation: loaderPulse 1s ease-in-out infinite alternate;
      }
      .loader-bar-bg {
        width: 200px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;
      }
      .loader-bar-fill {
        height: 100%; width: 0; background: #FFE000; border-radius: 2px;
        animation: loaderFill 1.8s ease forwards;
      }
      .loader-text {
        font-family: 'Space Mono', monospace;
        font-size: 0.65rem; letter-spacing: 0.25em;
        color: rgba(255,255,255,0.3); text-transform: uppercase;
      }
      @keyframes loaderPulse { from { opacity: 0.6; } to { opacity: 1; } }
      @keyframes loaderFill { from { width: 0; } to { width: 100%; } }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loader">
      <div class="loader-inner">
        <div class="loader-name">YUG_SRI</div>
        <div class="loader-bar-bg">
          <div class="loader-bar-fill"></div>
        </div>
        <div class="loader-text">Loading portfolio...</div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      // Hide loader after content loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('loader');
          if (loader) loader.classList.add('hidden');
        }, 1900);
      });
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
